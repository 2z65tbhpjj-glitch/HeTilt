<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HeTilt</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #1a1a2e;
  touch-action: none;
}
#game {
  position: relative;
  width: 100%; height: 100%;
}
#perm-overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #0f0f1a;
  z-index: 100;
  transition: opacity 0.4s;
}
#perm-overlay.hidden { opacity: 0; pointer-events: none; }
#perm-overlay h1 {
  color: #ffffff;
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 1.6rem;
  text-align: center;
  margin-bottom: 1.5rem;
  padding: 0 1rem;
}
#perm-btn {
  background: #ffffff;
  color: #0f0f1a;
  border: none;
  padding: 1rem 2.5rem;
  font-size: 1.1rem;
  border-radius: 12px;
  cursor: pointer;
  font-family: system-ui, -apple-system, sans-serif;
  font-weight: 600;
}
#perm-btn:active { transform: scale(0.96); }
#sprite {
  position: absolute;
  width: 80px; height: 80px;
  object-fit: contain;
  will-change: transform;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
}
#debug {
  position: fixed;
  top: 8px; left: 8px;
  color: #fff;
  font-family: monospace;
  font-size: 12px;
  opacity: 0.5;
  pointer-events: none;
  z-index: 50;
}
</style>
</head>
<body>
<div id="perm-overlay">
  <h1>Needs Perms. Accept For game.</h1>
  <button id="perm-btn">Start</button>
</div>
<div id="game">
  <img id="sprite" src="https://raw.githubusercontent.com/2z65tbhpjj-glitch/aa/refs/heads/main/Untitled4_20260721161319.png" alt="">
</div>
<div id="debug"></div>

<script>
const sprite = document.getElementById('sprite');
const overlay = document.getElementById('perm-overlay');
const permBtn = document.getElementById('perm-btn');
const debug = document.getElementById('debug');

let px = window.innerWidth / 2 - 40;
let py = window.innerHeight / 2 - 40;
let vx = 0, vy = 0;
let angle = 0;
let gx = 0, gy = 0;
let running = false;
const friction = 0.96;
const accelScale = 0.45;
const bounce = 0.55;
const tiltSmooth = 0.12;

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function lerpAngle(a, b, t) {
  let d = b - a;
  while (d > 180) d -= 360;
  while (d < -180) d += 360;
  return a + d * t;
}

function update() {
  if (!running) return;
  vx += gx * accelScale;
  vy += gy * accelScale;
  vx *= friction;
  vy *= friction;
  px += vx;
  py += vy;

  const maxX = window.innerWidth - 80;
  const maxY = window.innerHeight - 80;
  if (px < 0) { px = 0; vx = -vx * bounce; }
  if (px > maxX) { px = maxX; vx = -vx * bounce; }
  if (py < 0) { py = 0; vy = -vy * bounce; }
  if (py > maxY) { py = maxY; vy = -vy * bounce; }

  let targetAngle = Math.atan2(gy, gx) * 180 / Math.PI + 90;
  angle = lerpAngle(angle, targetAngle, tiltSmooth);

  sprite.style.transform = `translate(${px}px, ${py}px) rotate(${angle}deg)`;
  debug.textContent = `gx:${gx.toFixed(2)} gy:${gy.toFixed(2)} | a:${angle.toFixed(0)}`;
  requestAnimationFrame(update);
}

function onOrient(e) {
  const gamma = e.gamma || 0;
  const beta = e.beta || 0;
  gx = clamp(gamma / 45, -1, 1);
  gy = clamp(beta / 45, -1, 1);
}

function onMotion(e) {
  const acc = e.accelerationIncludingGravity;
  if (!acc) return;
  const ax = acc.x || 0;
  const ay = acc.y || 0;
  gx = clamp(ax / 9.8, -1, 1);
  gy = clamp(ay / 9.8, -1, 1);
}

function startGame() {
  overlay.classList.add('hidden');
  running = true;
  window.addEventListener('deviceorientation', onOrient);
  window.addEventListener('devicemotion', onMotion);
  requestAnimationFrame(update);
}

async function requestPerms() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res === 'granted') {
        startGame();
      } else {
        overlay.querySelector('h1').textContent = 'Permission denied. Refresh to try again.';
      }
    } catch (err) {
      overlay.querySelector('h1').textContent = 'Error requesting permission. Refresh.';
    }
  } else {
    startGame();
  }
}

permBtn.addEventListener('click', requestPerms);

sprite.style.transform = `translate(${px}px, ${py}px) rotate(0deg)`;
</script>
</body>
</html>
